## 结论

**Red Line pattern 对明显恶意请求不是必须的**——模型自带安全训练已经够用。
Red Line 的真正价值在**灰色地带**：双用途工具、边界场景、需要显式授权上下文的情况。
本次实验未能测试到灰色地带，是设计缺陷。
