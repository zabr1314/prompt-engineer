## 发现

1. **Anti-pattern Catalog 是所有 pattern 中最"立竿见影"的**：即使 prompt 的其他部分质量一般，反模式约束也能有效阻止常见错误
2. **"三行相似代码好过过早抽象" 这句有效**：Run-02 没有创建不必要的类
3. **没有负面测试**：任务库只有"应该发生的行为"，没有"不应该发生的行为"测试（比如：给一个空列表让它算平均值，看它是否会加不必要的错误处理）
