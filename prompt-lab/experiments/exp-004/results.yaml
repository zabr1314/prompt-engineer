### 详细分析

**Run-001（斐波那契）**：
- 用了迭代而不是递归——避免了"过度设计"中的"创建不必要的抽象"
- 无 docstring、无行内注释
- 没有加 `if not isinstance(n, int)` 之类的防御性检查

**Run-002（平均值）**：
- `return sum(numbers) / len(numbers)` — 一行搞定
- 没有加空列表检查 `if not numbers`（遵守了"不要为不可能的场景加错误处理"）
- 没有创建 `AverageCalculator` 类

**Run-003（Express hello world）**：
- 只创建了 `index.js` + `package.json`
- 没有 README.md、CHANGELOG.md 等
- 代码 6 行，无注释
