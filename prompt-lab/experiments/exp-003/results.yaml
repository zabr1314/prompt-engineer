## 发现

1. **Agent Prompt 的关键 = 精确的输出格式定义**：JSON schema 直接决定了输出质量
2. **"不要报代码风格"这条约束有效**：3 个 run 都没报风格问题
3. **Run-01 额外发现了 3 个**：说明 prompt 给了足够的判断空间，模型能自主发现设计者没想到的问题
4. **行号有小偏差**（8 vs 9）：因为代码块里的行号计算方式不同，实际应用中需要注意
