id: task-01
name: "JSON输出格式遵循"
type: system  # 测的是 system prompt 质量
description: |
  给模型一个 system prompt，要求它每次回复都以特定 JSON 格式输出。
  测试 prompt 能否让模型严格遵循输出格式约束。
difficulty: easy

input_prompts:
  - "今天天气怎么样？"
  - "帮我写一个快速排序算法"
  - "什么是量子计算？"
  - "推荐三本关于AI的书"
  - "解释一下什么是递归"

expected_schema:
  type: object
  required: [answer, confidence, category]
  properties:
    answer:
      type: string
    confidence:
      type: number
      minimum: 0
      maximum: 1
    category:
      type: string
      enum: [weather, coding, science, recommendation, explanation]

scorer: deterministic
pass_criteria: "5/5 valid JSON matching schema"

evaluation_steps:
  - "检查返回内容是否为合法 JSON"
  - "检查 JSON 是否包含所有 required 字段"
  - "检查字段类型是否正确"
  - "检查 confidence 是否在 0-1 范围内"
  - "检查 category 是否在枚举值内"
